<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style-lcd.css" />
  <title>Casio</title>
  <style>
    /* LCD zone: 227px wide x 91px tall, landscape, centered top */
    #lcd {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 227px;
      height: 91px;
      background: #0a0a0a;
      color: #7fff7f;
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }

    /* Main content area (fills width minus button bar) */
    .view-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Right button bar: 18px wide, full height */
    .btn-bar {
      width: 18px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      border-left: 1px solid #1a3a1a;
      padding: 2px 0;
    }

    /* Top title strip */
    .mode-title {
      font-size: 7px;
      color: #3fff3f;
      border-bottom: 1px solid #1a3a1a;
      padding: 1px 3px;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 12px;
      flex-shrink: 0;
    }

    /* Scrollable text area */
    .scroll-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .scroll-text {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      padding: 2px 3px;
      font-size: 8px;
      line-height: 1.25;
      word-wrap: break-word;
      white-space: pre-wrap;
      color: #7fff7f;
    }

    /* Mini buttons */
    .btn {
      background: none;
      border: 1px solid #3a6a3a;
      color: #7fff7f;
      font-family: "Courier New", monospace;
      font-size: 7px;
      padding: 0;
      width: 14px;
      height: 14px;
      line-height: 14px;
      cursor: pointer;
      border-radius: 1px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active { background: #1a3a1a; }

    /* Menu items */
    .menu-item {
      padding: 1px 3px;
      font-size: 8px;
      cursor: pointer;
      border-left: 2px solid transparent;
    }
    .menu-item.selected {
      border-left: 2px solid #7fff7f;
      color: #fff;
    }

    /* QCM choice */
    .qcm-choice {
      padding: 1px 3px;
      font-size: 8px;
      cursor: pointer;
      border-left: 2px solid transparent;
    }
    .qcm-choice.selected {
      border-left: 2px solid #7fff7f;
      color: #fff;
    }

    /* Status dot */
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ff3f3f;
      display: inline-block;
    }

    /* Photo input */
    #photo-question {
      width: calc(100% - 6px);
      margin: 2px 3px;
      background: #0a0a0a;
      border: 1px solid #3a6a3a;
      color: #7fff7f;
      font-family: "Courier New", monospace;
      font-size: 8px;
      padding: 1px 2px;
      outline: none;
    }
    #photo-question::placeholder { color: #3a6a3a; }

    #camera-input { display: none; }

    /* centering helper */
    .center-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .small-label {
      font-size: 7px;
      color: #3fff3f;
      padding: 1px 3px;
    }
    .row-btns {
      display: flex;
      justify-content: space-between;
      padding: 1px 3px;
    }
  </style>
</head>
<body>
  <div id="lcd">

    <!-- ── MENU VIEW ─────────────────────────────────────── -->
    <div id="view-menu" class="view-inner">
      <div class="mode-title">
        <span>CASIO FX-991ES</span>
        <span class="status-dot" id="conn-dot"></span>
      </div>
      <div class="scroll-area">
        <div id="lcd-text" class="scroll-text">
          <div class="menu-item selected" data-idx="0">&gt; [PHOTO]</div>
          <div class="menu-item" data-idx="1">&nbsp;&nbsp;[QCM]</div>
          <div class="menu-item" data-idx="2">&nbsp;&nbsp;[DEFILER]</div>
        </div>
      </div>
    </div>
    <div class="btn-bar" id="menu-bar">
      <button class="btn" id="menu-up">&#9650;</button>
      <button class="btn" id="menu-ok">OK</button>
      <button class="btn" id="menu-dn">&#9660;</button>
    </div>

    <!-- ── PHOTO VIEW ────────────────────────────────────── -->
    <div id="view-photo" class="view-inner" style="display:none">
      <div class="mode-title">
        <span>PHOTO&gt;AI</span>
        <button class="btn" id="photo-back" style="height:10px;font-size:7px">&#8592;</button>
      </div>
      <!-- idle -->
      <div id="photo-idle" class="center-col">
        <button class="btn" id="photo-capture-btn" style="width:22px;height:22px;font-size:13px">&#128247;</button>
        <span class="small-label">PHOTO</span>
      </div>
      <!-- question -->
      <div id="photo-quest" style="display:none;flex-direction:column;flex:1">
        <span class="small-label">QUESTION (opt.):</span>
        <input id="photo-question" type="text" placeholder="?" autocomplete="off" />
        <div class="row-btns">
          <button class="btn" id="photo-cancel" style="width:auto;padding:0 3px">ANN</button>
          <button class="btn" id="photo-send" style="width:auto;padding:0 3px">OK</button>
        </div>
      </div>
      <!-- result -->
      <div id="photo-result" class="scroll-area" style="display:none">
        <div id="photo-result-text" class="scroll-text"></div>
      </div>
    </div>
    <div class="btn-bar" id="photo-bar" style="display:none">
      <button class="btn" id="photo-scroll-up">&#9650;</button>
      <button class="btn" id="photo-new">&#128247;</button>
      <button class="btn" id="photo-scroll-dn">&#9660;</button>
    </div>

    <!-- ── QCM VIEW ───────────────────────────────────────── -->
    <div id="view-qcm" class="view-inner" style="display:none">
      <div class="mode-title">
        <span>QCM</span>
        <button class="btn" id="qcm-back" style="height:10px;font-size:7px">&#8592;</button>
      </div>
      <div id="qcm-wait" class="center-col">
        <span class="small-label">EN ATTENTE PC...</span>
      </div>
      <div id="qcm-active" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div id="qcm-question" style="padding:2px 3px;font-size:8px;color:#fff;border-bottom:1px solid #1a3a1a;word-wrap:break-word;max-height:36px;overflow:hidden;flex-shrink:0"></div>
        <div id="qcm-choices" style="overflow:hidden;flex:1"></div>
      </div>
    </div>
    <div class="btn-bar" id="qcm-bar" style="display:none">
      <button class="btn" id="qcm-up">&#9650;</button>
      <button class="btn" id="qcm-ok">OK</button>
      <button class="btn" id="qcm-dn">&#9660;</button>
    </div>

    <!-- ── SCROLL VIEW ───────────────────────────────────── -->
    <div id="view-scroll" class="view-inner" style="display:none">
      <div class="mode-title">
        <span>DEFILEMENT</span>
        <button class="btn" id="scroll-back" style="height:10px;font-size:7px">&#8592;</button>
      </div>
      <div id="scroll-area" class="scroll-area">
        <div id="scroll-text" class="scroll-text">Swipe ou boutons pour defiler.
Affiche le dernier texte Claude.</div>
      </div>
    </div>
    <div class="btn-bar" id="scroll-bar" style="display:none">
      <button class="btn" id="scroll-up">&#9650;</button>
      <button class="btn" id="scroll-dn">&#9660;</button>
    </div>

  </div>

  <input type="file" id="camera-input" accept="image/*" capture="environment" />

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentView = "menu";
    let menuIdx = 0;
    let photoImageB64 = null;
    let qcmChoiceIdx = 0;
    let qcmChoices = [];

    // ── Socket ────────────────────────────────────────────────
    socket.on("connect", () => setDot(true));
    socket.on("disconnect", () => setDot(false));
    socket.on("qcm:receive", (data) => {
      showView("qcm");
      showQCM(data);
    });

    function setDot(on) {
      document.getElementById("conn-dot").style.background = on ? "#3fff3f" : "#ff3f3f";
    }

    // ── View switching ────────────────────────────────────────
    const VIEWS = ["menu", "photo", "qcm", "scroll"];
    const BARS  = { menu: "menu-bar", photo: "photo-bar", qcm: "qcm-bar", scroll: "scroll-bar" };

    function showView(name) {
      VIEWS.forEach((v) => {
        const el = document.getElementById("view-" + v);
        el.style.display = "none";
        const bar = document.getElementById(BARS[v]);
        if (bar) bar.style.display = "none";
      });
      document.getElementById("view-" + name).style.display = "flex";
      // show bar only when relevant
      if (name === "menu") document.getElementById("menu-bar").style.display = "flex";
      if (name === "scroll") document.getElementById("scroll-bar").style.display = "flex";
      currentView = name;
    }

    // ── MENU ──────────────────────────────────────────────────
    const menuItems = document.querySelectorAll(".menu-item");
    function updateMenu() {
      menuItems.forEach((el, i) => {
        el.classList.toggle("selected", i === menuIdx);
        el.innerHTML = (i === menuIdx ? "&gt; " : "&nbsp;&nbsp;") +
          ["[PHOTO]", "[QCM]", "[DEFILER]"][i];
      });
    }
    document.getElementById("menu-up").addEventListener("click", () => {
      menuIdx = (menuIdx - 1 + 3) % 3; updateMenu();
    });
    document.getElementById("menu-dn").addEventListener("click", () => {
      menuIdx = (menuIdx + 1) % 3; updateMenu();
    });
    document.getElementById("menu-ok").addEventListener("click", () => {
      showView(["photo", "qcm", "scroll"][menuIdx]);
    });

    // ── PHOTO ─────────────────────────────────────────────────
    document.getElementById("photo-back").addEventListener("click", () => showView("menu"));
    document.getElementById("photo-new").addEventListener("click", resetPhoto);

    function resetPhoto() {
      photoImageB64 = null;
      document.getElementById("photo-idle").style.display = "flex";
      document.getElementById("photo-quest").style.display = "none";
      document.getElementById("photo-result").style.display = "none";
      document.getElementById("photo-bar").style.display = "none";
      document.getElementById("photo-question").value = "";
    }

    document.getElementById("photo-capture-btn").addEventListener("click", () => {
      document.getElementById("camera-input").click();
    });

    document.getElementById("camera-input").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        photoImageB64 = ev.target.result.split(",")[1];
        document.getElementById("photo-idle").style.display = "none";
        document.getElementById("photo-quest").style.display = "flex";
      };
      reader.readAsDataURL(file);
      e.target.value = "";
    });

    document.getElementById("photo-cancel").addEventListener("click", resetPhoto);

    document.getElementById("photo-send").addEventListener("click", async () => {
      const q = document.getElementById("photo-question").value.trim();
      document.getElementById("photo-quest").style.display = "none";
      const resultArea = document.getElementById("photo-result");
      const resultText = document.getElementById("photo-result-text");
      resultArea.style.display = "block";
      resultText.textContent = "...";
      resultText.style.top = "0px";

      try {
        const res = await fetch("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: photoImageB64, question: q || null }),
        });
        const data = await res.json();
        const text = data.text || data.error || "Erreur";
        resultText.textContent = text;
        document.getElementById("scroll-text").textContent = text;
      } catch {
        resultText.textContent = "ERREUR RESEAU";
      }
      document.getElementById("photo-bar").style.display = "flex";
    });

    setupScroll(
      document.getElementById("photo-result"),
      document.getElementById("photo-result-text"),
      "photo-scroll-up", "photo-scroll-dn"
    );

    // ── QCM ───────────────────────────────────────────────────
    document.getElementById("qcm-back").addEventListener("click", () => showView("menu"));

    function showQCM(data) {
      document.getElementById("qcm-wait").style.display = "none";
      document.getElementById("qcm-active").style.display = "flex";
      document.getElementById("qcm-bar").style.display = "flex";
      document.getElementById("qcm-question").textContent = data.question || "";
      qcmChoices = data.choices || [];
      qcmChoiceIdx = 0;
      renderChoices();
    }

    function renderChoices() {
      const c = document.getElementById("qcm-choices");
      c.innerHTML = "";
      qcmChoices.forEach((text, i) => {
        const el = document.createElement("div");
        el.className = "qcm-choice" + (i === qcmChoiceIdx ? " selected" : "");
        el.textContent = (i === qcmChoiceIdx ? "> " : "  ") + text;
        c.appendChild(el);
      });
    }

    document.getElementById("qcm-up").addEventListener("click", () => {
      if (!qcmChoices.length) return;
      qcmChoiceIdx = (qcmChoiceIdx - 1 + qcmChoices.length) % qcmChoices.length;
      renderChoices();
    });
    document.getElementById("qcm-dn").addEventListener("click", () => {
      if (!qcmChoices.length) return;
      qcmChoiceIdx = (qcmChoiceIdx + 1) % qcmChoices.length;
      renderChoices();
    });
    document.getElementById("qcm-ok").addEventListener("click", () => {
      if (!qcmChoices.length) return;
      socket.emit("qcm:answer", { index: qcmChoiceIdx, text: qcmChoices[qcmChoiceIdx] });
      const c = document.getElementById("qcm-choices");
      c.innerHTML = `<div style="padding:2px 3px;font-size:8px;color:#fff">OK: ${qcmChoices[qcmChoiceIdx]}</div>`;
    });

    // ── SCROLL ────────────────────────────────────────────────
    document.getElementById("scroll-back").addEventListener("click", () => showView("menu"));
    setupScroll(
      document.getElementById("scroll-area"),
      document.getElementById("scroll-text"),
      "scroll-up", "scroll-dn"
    );

    // ── Generic scroll ────────────────────────────────────────
    function setupScroll(container, textEl, upId, dnId) {
      let y = 0;
      const STEP = 15;
      function max() { return Math.max(0, textEl.scrollHeight - container.clientHeight); }
      function apply() { textEl.style.top = -y + "px"; }

      if (upId) document.getElementById(upId).addEventListener("click", () => { y = Math.max(0, y - STEP); apply(); });
      if (dnId) document.getElementById(dnId).addEventListener("click", () => { y = Math.min(max(), y + STEP); apply(); });

      let ty = 0;
      container.addEventListener("touchstart", (e) => { ty = e.touches[0].clientY; }, { passive: true });
      container.addEventListener("touchmove", (e) => {
        const dy = ty - e.touches[0].clientY;
        ty = e.touches[0].clientY;
        y = Math.min(max(), Math.max(0, y + dy));
        apply();
        e.preventDefault();
      }, { passive: false });

      new MutationObserver(() => { y = 0; apply(); })
        .observe(textEl, { childList: true, characterData: true, subtree: true });
    }

    // ── PWA ───────────────────────────────────────────────────
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");

    showView("menu");
  </script>
</body>
</html>
