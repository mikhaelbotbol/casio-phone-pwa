<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style-lcd.css" />
  <title>Casio</title>
  <style>
    /* Photo mode question input */
    #photo-question {
      width: 85px;
      background: #0a0a0a;
      border: 1px solid #3a6a3a;
      color: #7fff7f;
      font-family: "Courier New", monospace;
      font-size: 8px;
      padding: 1px 2px;
      outline: none;
      margin: 2px 3px;
    }
    #photo-question::placeholder { color: #3a6a3a; }

    .mode-title {
      font-size: 7px;
      color: #3fff3f;
      border-bottom: 1px solid #1a3a1a;
      padding: 1px 3px;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 13px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="lcd">
    <!-- MENU VIEW -->
    <div id="view-menu" class="view">
      <div class="mode-title">
        <span>CASIO FX-991ES</span>
        <span class="status-dot" id="conn-dot" style="background:#ff3f3f"></span>
      </div>
      <div id="lcd-content">
        <div id="lcd-text">
          <div class="menu-item selected" data-idx="0">&gt; [PHOTO]</div>
          <div class="menu-item" data-idx="1">  [QCM]</div>
          <div class="menu-item" data-idx="2">  [DEFILER]</div>
        </div>
      </div>
      <div id="lcd-bar">
        <button class="btn" id="menu-up">&#9650;</button>
        <button class="btn" id="menu-ok">OK</button>
        <button class="btn" id="menu-dn">&#9660;</button>
      </div>
    </div>

    <!-- PHOTO VIEW -->
    <div id="view-photo" class="view" style="display:none;flex-direction:column;height:100%">
      <div class="mode-title">
        <span>PHOTO&gt;AI</span>
        <button class="btn" id="photo-back" style="font-size:7px">&#8592;</button>
      </div>
      <div id="photo-state-idle" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3px">
        <button class="btn" id="photo-capture-btn" style="font-size:11px;padding:2px 4px">&#128247;</button>
        <span style="font-size:7px;color:#3fff3f">PRENDRE PHOTO</span>
      </div>
      <div id="photo-state-question" style="display:none;flex-direction:column">
        <span style="font-size:7px;color:#3fff3f;padding:1px 3px">QUESTION (opt.):</span>
        <input id="photo-question" type="text" placeholder="?" autocomplete="off" />
        <div style="display:flex;justify-content:space-between;padding:1px 3px">
          <button class="btn" id="photo-cancel">ANN</button>
          <button class="btn" id="photo-send">ENVOYER</button>
        </div>
      </div>
      <div id="photo-state-result" style="display:none;flex:1;overflow:hidden;position:relative">
        <div id="photo-result-text" style="position:absolute;top:0;left:0;width:100%;padding:2px 3px;font-size:8px;word-wrap:break-word;white-space:pre-wrap;color:#7fff7f"></div>
      </div>
      <div id="photo-bar" class="lcd-bar" style="display:none">
        <button class="btn" id="photo-scroll-up">&#9650;</button>
        <button class="btn" id="photo-new">&#128247;</button>
        <button class="btn" id="photo-scroll-dn">&#9660;</button>
      </div>
    </div>

    <!-- QCM VIEW -->
    <div id="view-qcm" class="view" style="display:none;flex-direction:column;height:100%">
      <div class="mode-title">
        <span>QCM</span>
        <button class="btn" id="qcm-back" style="font-size:7px">&#8592;</button>
      </div>
      <div id="qcm-wait" style="flex:1;display:flex;align-items:center;justify-content:center">
        <span style="font-size:7px;color:#3fff3f">EN ATTENTE PC...</span>
      </div>
      <div id="qcm-active" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div id="qcm-question" style="padding:2px 3px;font-size:8px;color:#fff;border-bottom:1px solid #1a3a1a;word-wrap:break-word;max-height:70px;overflow:hidden"></div>
        <div id="qcm-choices" style="flex:1;overflow:hidden"></div>
      </div>
      <div id="qcm-bar" class="lcd-bar" style="display:none">
        <button class="btn" id="qcm-up">&#9650;</button>
        <button class="btn" id="qcm-ok">OK</button>
        <button class="btn" id="qcm-dn">&#9660;</button>
      </div>
    </div>

    <!-- SCROLL VIEW (free text scroll demo) -->
    <div id="view-scroll" class="view" style="display:none;flex-direction:column;height:100%">
      <div class="mode-title">
        <span>DEFILEMENT</span>
        <button class="btn" id="scroll-back" style="font-size:7px">&#8592;</button>
      </div>
      <div id="lcd-content-scroll" style="flex:1;overflow:hidden;position:relative">
        <div id="scroll-text" style="position:absolute;top:0;left:0;width:100%;padding:2px 3px;font-size:8px;word-wrap:break-word;white-space:pre-wrap;color:#7fff7f">
Swipe ou boutons pour defiler.
Ce mode affiche le dernier texte recu de Claude.
        </div>
      </div>
      <div class="lcd-bar">
        <button class="btn" id="scroll-up">&#9650;</button>
        <button class="btn" id="scroll-dn">&#9660;</button>
      </div>
    </div>
  </div>

  <!-- Hidden camera input -->
  <input type="file" id="camera-input" accept="image/*" capture="environment" />

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    const socket = io();
    let currentView = "menu";
    let menuIdx = 0;
    let photoImageB64 = null;
    let photoScrollTop = 0;
    let qcmChoiceIdx = 0;
    let qcmChoices = [];
    let lastClaudeText = "";

    // ─── Socket ──────────────────────────────────────────────────────────────
    socket.on("connect", () => setDot(true));
    socket.on("disconnect", () => setDot(false));

    socket.on("qcm:receive", (data) => {
      if (currentView !== "qcm") showView("qcm");
      showQCM(data);
    });

    function setDot(on) {
      document.getElementById("conn-dot").style.background = on ? "#3fff3f" : "#ff3f3f";
    }

    // ─── View switching ──────────────────────────────────────────────────────
    function showView(name) {
      document.querySelectorAll(".view").forEach((v) => (v.style.display = "none"));
      const v = document.getElementById("view-" + name);
      v.style.display = "flex";
      currentView = name;
    }

    // ─── MENU ─────────────────────────────────────────────────────────────────
    const menuItems = document.querySelectorAll(".menu-item");
    function updateMenuSelect() {
      menuItems.forEach((el, i) => {
        el.classList.toggle("selected", i === menuIdx);
        el.textContent = (i === menuIdx ? "> " : "  ") + ["[PHOTO]", "[QCM]", "[DEFILER]"][i];
      });
    }

    document.getElementById("menu-up").addEventListener("click", () => {
      menuIdx = (menuIdx - 1 + 3) % 3;
      updateMenuSelect();
    });
    document.getElementById("menu-dn").addEventListener("click", () => {
      menuIdx = (menuIdx + 1) % 3;
      updateMenuSelect();
    });
    document.getElementById("menu-ok").addEventListener("click", () => {
      const views = ["photo", "qcm", "scroll"];
      showView(views[menuIdx]);
    });

    // ─── PHOTO MODE ──────────────────────────────────────────────────────────
    document.getElementById("photo-back").addEventListener("click", () => showView("menu"));
    document.getElementById("photo-new").addEventListener("click", resetPhoto);

    function resetPhoto() {
      photoImageB64 = null;
      photoScrollTop = 0;
      document.getElementById("photo-state-idle").style.display = "flex";
      document.getElementById("photo-state-question").style.display = "none";
      document.getElementById("photo-state-result").style.display = "none";
      document.getElementById("photo-bar").style.display = "none";
      document.getElementById("photo-question").value = "";
    }

    document.getElementById("photo-capture-btn").addEventListener("click", () => {
      document.getElementById("camera-input").click();
    });

    document.getElementById("camera-input").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Strip data URI prefix to get pure base64
        photoImageB64 = ev.target.result.split(",")[1];
        document.getElementById("photo-state-idle").style.display = "none";
        document.getElementById("photo-state-question").style.display = "flex";
      };
      reader.readAsDataURL(file);
      e.target.value = "";
    });

    document.getElementById("photo-cancel").addEventListener("click", resetPhoto);

    document.getElementById("photo-send").addEventListener("click", async () => {
      const q = document.getElementById("photo-question").value.trim();
      document.getElementById("photo-state-question").style.display = "none";
      document.getElementById("photo-state-result").style.display = "block";
      const el = document.getElementById("photo-result-text");
      el.textContent = "...";
      photoScrollTop = 0;
      el.style.top = "0px";

      try {
        const res = await fetch("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: photoImageB64, question: q || null }),
        });
        const data = await res.json();
        const text = data.text || data.error || "Erreur";
        el.textContent = text;
        lastClaudeText = text;
        // Also update scroll view
        document.getElementById("scroll-text").textContent = text;
      } catch (err) {
        el.textContent = "ERREUR RESEAU";
      }

      document.getElementById("photo-bar").style.display = "flex";
    });

    // Photo scroll
    setupScroll(
      document.getElementById("photo-state-result"),
      document.getElementById("photo-result-text"),
      "photo-scroll-up",
      "photo-scroll-dn"
    );

    // ─── QCM MODE ────────────────────────────────────────────────────────────
    document.getElementById("qcm-back").addEventListener("click", () => showView("menu"));

    function showQCM(data) {
      document.getElementById("qcm-wait").style.display = "none";
      const activeEl = document.getElementById("qcm-active");
      activeEl.style.display = "flex";
      document.getElementById("qcm-bar").style.display = "flex";

      document.getElementById("qcm-question").textContent = data.question || "";
      qcmChoices = data.choices || [];
      qcmChoiceIdx = 0;
      renderChoices();
    }

    function renderChoices() {
      const container = document.getElementById("qcm-choices");
      container.innerHTML = "";
      qcmChoices.forEach((c, i) => {
        const el = document.createElement("div");
        el.className = "qcm-choice" + (i === qcmChoiceIdx ? " selected" : "");
        el.textContent = (i === qcmChoiceIdx ? "> " : "  ") + c;
        container.appendChild(el);
      });
    }

    document.getElementById("qcm-up").addEventListener("click", () => {
      if (qcmChoices.length === 0) return;
      qcmChoiceIdx = (qcmChoiceIdx - 1 + qcmChoices.length) % qcmChoices.length;
      renderChoices();
    });
    document.getElementById("qcm-dn").addEventListener("click", () => {
      if (qcmChoices.length === 0) return;
      qcmChoiceIdx = (qcmChoiceIdx + 1) % qcmChoices.length;
      renderChoices();
    });
    document.getElementById("qcm-ok").addEventListener("click", () => {
      if (qcmChoices.length === 0) return;
      socket.emit("qcm:answer", { index: qcmChoiceIdx, text: qcmChoices[qcmChoiceIdx] });
      // Show confirmation
      const container = document.getElementById("qcm-choices");
      container.innerHTML = "";
      const el = document.createElement("div");
      el.style.cssText = "padding:2px 3px;font-size:8px;color:#fff";
      el.textContent = "OK: " + qcmChoices[qcmChoiceIdx];
      container.appendChild(el);
    });

    // ─── SCROLL MODE ─────────────────────────────────────────────────────────
    document.getElementById("scroll-back").addEventListener("click", () => showView("menu"));
    setupScroll(
      document.getElementById("lcd-content-scroll"),
      document.getElementById("scroll-text"),
      "scroll-up",
      "scroll-dn"
    );

    // ─── Generic scroll helper ────────────────────────────────────────────────
    function setupScroll(container, textEl, upId, dnId) {
      let scrollY = 0;
      const STEP = 20;

      function clamp(v) {
        const max = Math.max(0, textEl.scrollHeight - container.clientHeight);
        return Math.min(Math.max(0, v), max);
      }

      function apply() {
        textEl.style.top = -scrollY + "px";
      }

      if (upId) {
        document.getElementById(upId).addEventListener("click", () => {
          scrollY = clamp(scrollY - STEP);
          apply();
        });
      }
      if (dnId) {
        document.getElementById(dnId).addEventListener("click", () => {
          scrollY = clamp(scrollY + STEP);
          apply();
        });
      }

      // Touch swipe
      let touchStartY = 0;
      container.addEventListener("touchstart", (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      container.addEventListener("touchmove", (e) => {
        const dy = touchStartY - e.touches[0].clientY;
        touchStartY = e.touches[0].clientY;
        scrollY = clamp(scrollY + dy);
        apply();
        e.preventDefault();
      }, { passive: false });

      // Reset scroll when content changes (observe textEl)
      const obs = new MutationObserver(() => {
        scrollY = 0;
        apply();
      });
      obs.observe(textEl, { childList: true, characterData: true, subtree: true });
    }

    // ─── PWA service worker ──────────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }

    // ─── Init ────────────────────────────────────────────────────────────────
    showView("menu");
  </script>
</body>
</html>
